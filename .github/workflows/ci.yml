name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (Elixir/Phoenix)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: zanshin_test
          POSTGRES_USER: zanshin
          POSTGRES_PASSWORD: zanshin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zanshin -d zanshin_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    env:
      MIX_ENV: test
      DB_HOST: localhost
      JWT_SECRET: ci-jwt-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.1"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            apps/api/deps
            apps/api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('apps/api/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test
